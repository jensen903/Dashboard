<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窄巷口全渠道可视化驾驶舱 - 视觉完美版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <script src="./dist/db.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: system-ui, sans-serif; overflow-x: hidden; }
        .sidebar { width: 220px; background: #001529; height: 100vh; color: #fff; position: fixed; z-index: 50; }
        .main-content { margin-left: 220px; min-height: 100vh; padding: 2rem; }
        .nav-item { padding: 12px 24px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; border-left: 4px solid transparent; }
        .nav-item.active { background: #1890ff; border-left: 4px solid #fff; }
        .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); height: 100%; }
        .stat-value { font-size: 26px; font-weight: bold; color: #1890ff; line-height: 1.2; }
        .stat-label { font-size: 13px; color: #8c8c8c; margin-bottom: 4px; }
        .chart-container { height: 320px; width: 100%; }
        .btn-time { padding: 4px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 12px; cursor: pointer; background: #fff; }
        .btn-time.active { background: #1890ff; color: #fff; border-color: #1890ff; }
    </style>
</head>
<body>
    <div id="app" class="flex">
        <div class="sidebar">
            <div class="p-6 text-xl font-bold border-b border-gray-700 mb-4 text-center text-blue-400">窄巷口驾驶舱</div>
            <div v-for="item in menu" :key="item.key" :class="['nav-item', currentTab === item.key ? 'active' : '']" @click="currentTab = item.key">
                <span class="mr-3">{{ item.icon }}</span>{{ item.name }}
            </div>
        </div>

        <div class="main-content flex-grow">
            <div v-if="!DB.all" class="flex items-center justify-center h-full text-gray-500 font-bold">数据库载入中...</div>
            
            <div v-else>
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">{{ currentTabName }}</h1>
                    <div class="flex items-center space-x-2 bg-white p-2 rounded shadow-sm border text-xs">
                        <button v-for="t in [{l:'全月',v:'all'},{l:'近7天',v:'7'}]" :class="['btn-time', timeRange === t.v ? 'active' : '']" @click="timeRange = t.v">{{t.l}}</button>
                        <span class="font-bold text-blue-600 ml-4 italic">{{ dateDisplay }}</span>
                    </div>
                </div>

                <!-- 1. 大盘概览 -->
                <div v-show="currentTab === 'overview'" class="space-y-6">
                    <div class="grid grid-cols-4 gap-6">
                        <div class="card" v-for="tile in dynamicStats.tiles" :key="tile.label">
                            <div class="stat-label">{{tile.label}}</div>
                            <div class="stat-value">{{tile.prefix}}{{formatNum(tile.value)}}</div>
                        </div>
                    </div>
                    
                    <div class="card"><div class="font-bold mb-4">全国营收热力分布</div><v-chart :option="options.overview.map" height="500px"></v-chart></div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="card"><div class="font-bold mb-4 text-sm text-blue-600">平台营收占比</div><v-chart :option="options.overview.pie" height="300px"></v-chart></div>
                        <div class="card">
                            <div class="font-bold mb-4 text-sm">全渠道核心指标汇总</div>
                            <table class="w-full text-xs text-left">
                                <thead class="bg-gray-50 font-bold"><tr><th class="p-2">平台</th><th class="p-2 text-right">收入</th><th class="p-2 text-right">单量</th><th class="p-2 text-right">客单价</th></tr></thead>
                                <tbody><tr v-for="p in dynamicStats.platformRows" :key="p.name" class="border-b"><td class="p-2 font-bold">{{p.name}}</td><td class="p-2 text-right">¥{{formatNum(p.revenue)}}</td><td class="p-2 text-right">{{formatNum(p.orders)}}</td><td class="p-2 text-right text-blue-600 font-bold">{{p.avgPay}}</td></tr></tbody>
                            </table>
                        </div>
                        <div class="card"><div class="font-bold mb-4 text-sm text-green-600">平台订单量对比</div><v-chart :option="options.overview.barOrders" height="300px"></v-chart></div>
                        <div class="card"><div class="font-bold mb-4 text-sm text-orange-600">平台客单价对比</div><v-chart :option="options.overview.barAvg" height="300px"></v-chart></div>
                    </div>
                </div>

                <!-- 2. 趋势分析 -->
                <div v-show="currentTab === 'trend'" class="space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="card" v-for="(opt, k) in options.trend" :key="k"><div class="font-bold mb-4 text-xs text-gray-500">{{ trendTitles[k] }}</div><v-chart :option="opt" height="350px"></v-chart></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;

        const VChart = {
            props: ['option', 'height'],
            template: `<div ref="el" :style="{height:height||'350px', width:'100%'}"></div>`,
            setup(props) {
                const el = ref(null);
                let chart = null;
                const update = () => { if(chart && props.option) chart.setOption(props.option, true); };
                onMounted(() => {
                    chart = echarts.init(el.value); update();
                    new ResizeObserver(() => chart.resize()).observe(el.value);
                });
                watch(() => props.option, update, {deep:true});
                return { el };
            }
        };

        createApp({
            components: {'v-chart': VChart},
            setup() {
                const currentTab = ref('overview');
                const timeRange = ref('all');
                const menu = [{name:'大盘概览',key:'overview',icon:'📊'},{name:'趋势分析',key:'trend',icon:'📈'},{name:'门店分析',key:'store',icon:'🏠'}];
                const trendTitles = {rev:'营收趋势', ord:'订单趋势', exp:'曝光趋势', rate:'到手率趋势'};

                const slice = computed(() => {
                    const all = DB.all || [];
                    if (!all.length) return [];
                    if (timeRange.value === 'all') return all;
                    const end = new Date(all[all.length-1].d);
                    const start = new Date(end); start.setDate(end.getDate() - 7);
                    return all.filter(r => new Date(r.d) >= start);
                });

                const statsAgg = computed(() => {
                    const data = slice.value;
                    const res = { r:0, o:0, s:new Set(), p:new Set(), plat:{}, daily:{}, provMap:{} };
                    data.forEach(r => {
                        res.r += r.r; res.o += r.o; res.s.add(r.sn); res.p.add(r.pv);
                        if(!res.plat[r.pt]) res.plat[r.pt] = {r:0, o:0, ap:0};
                        res.plat[r.pt].r += r.r; res.plat[r.pt].o += r.o; res.plat[r.pt].ap += r.ap;
                        res.provMap[r.pv] = (res.provMap[r.pv] || 0) + r.r;
                        const dk = r.d + r.pt;
                        if(!res.daily[dk]) res.daily[dk] = {r:0, o:0, p:0, e:0};
                        res.daily[dk].r+=r.r; res.daily[dk].o+=r.o; res.daily[dk].p+=r.ap; res.daily[dk].e+=r.e;
                    });
                    return res;
                });

                const dynamicStats = computed(() => {
                    const agg = statsAgg.value;
                    return {
                        tiles: [{label:'总营收',value:agg.r,prefix:'¥'},{label:'总订单',value:agg.o,prefix:''},{label:'活跃店',value:agg.s.size,prefix:''},{label:'省份',value:agg.p.size,prefix:''}],
                        platformRows: Object.keys(agg.plat).map(k=>({name:k, revenue:agg.plat[k].r, orders:agg.plat[k].o, avgPay:(agg.plat[k].ap/(agg.plat[k].o||1)).toFixed(2)})),
                        raw: agg
                    };
                });

                const options = computed(() => {
                    const agg = statsAgg.value;
                    const dates = [...new Set(slice.value.map(i=>i.d))].sort();
                    const pList = ['美团','京东','饿了么'];
                    const colors = ['#1890ff', '#f5222d', '#52c41a'];

                    return {
                        overview: {
                            map: { tooltip:{trigger:'item'}, visualMap:{min:0, max:agg.r/8, inRange:{color:['#e0ffff','#1890ff']}}, series:[{type:'map', mapType:'china', data:Object.keys(agg.provMap).map(k=>({name:k, value:agg.provMap[k]}))}] },
                            pie: { series:[{type:'pie', radius:['40%','70%'], data:Object.keys(agg.plat).map(k=>({name:k, value:agg.plat[k].r}))}] },
                            barOrders: { xAxis:{type:'category', data:pList}, yAxis:{type:'value'}, series:[{type:'bar', data:pList.map(p=>agg.plat[p]?agg.plat[p].o:0), itemStyle:{color:'#52c41a'}}] },
                            barAvg: { xAxis:{type:'category', data:pList}, yAxis:{type:'value'}, series:[{type:'bar', data:pList.map(p=>agg.plat[p]?(agg.plat[p].ap/agg.plat[p].o).toFixed(2):0), itemStyle:{color:'#fa8c16'}}] }
                        },
                        trend: {
                            rev: { legend:{bottom:0}, tooltip:{trigger:'axis'}, xAxis:{data:dates}, series:pList.map((p,i)=>({name:p,type:'line',smooth:true,color:colors[i],data:dates.map(d=>agg.daily[d+p]?agg.daily[d+p].r:0)})) },
                            ord: { legend:{bottom:0}, tooltip:{trigger:'axis'}, xAxis:{data:dates}, series:pList.map((p,i)=>({name:p,type:'line',smooth:true,color:colors[i],data:dates.map(d=>agg.daily[d+p]?agg.daily[d+p].o:0)})) },
                            exp: { legend:{bottom:0}, tooltip:{trigger:'axis'}, xAxis:{data:dates}, series:pList.map((p,i)=>({name:p,type:'line',smooth:true,color:colors[i],data:dates.map(d=>agg.daily[d+p]?agg.daily[d+p].e:0)})) },
                            rate: { legend:{bottom:0}, tooltip:{trigger:'axis'}, xAxis:{data:dates}, series:pList.map((p,i)=>({name:p,type:'line',smooth:true,color:colors[i],data:dates.map(d=>{const r=agg.daily[d+p];return r?(r.p>0?(r.r/r.p*100).toFixed(2):0):0})})) }
                        }
                    };
                });

                return { currentTab, timeRange, menu, DB, dynamicStats, options, formatNum:(n)=>Number(n).toLocaleString('zh-CN'), dateDisplay: computed(()=>slice.value.length ? `${slice.value[0].d} 至 ${slice.value[slice.value.length-1].d}` : '加载中'), currentTabName: computed(()=>menu.find(m=>m.key===currentTab.value).name), trendTitles };
            }
        }).mount('#app');
    </script>
</body>
</html>
