<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>窄巷口可视化驾驶舱 - 恢复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <!-- 引入数据库 -->
    <script src="./dist/db.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: system-ui, sans-serif; }
        .sidebar { width: 200px; background: #001529; height: 100vh; color: #fff; position: fixed; }
        .main { margin-left: 200px; padding: 2rem; }
        .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-value { font-size: 24px; font-weight: bold; color: #1890ff; }
        .nav-item { padding: 12px 24px; cursor: pointer; }
        .nav-item.active { background: #1890ff; }
    </style>
</head>
<body>
    <div id="app" class="flex">
        <div class="sidebar">
            <div class="p-6 font-bold border-b border-gray-700 mb-4 text-center">窄巷口驾驶舱</div>
            <div v-for="m in menu" :key="m.k" :class="['nav-item', tab === m.k ? 'active' : '']" @click="tab = m.k">{{ m.n }}</div>
        </div>
        <div class="main flex-grow">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">{{ currentName }}</h1>
                <div class="bg-white p-2 rounded border text-xs">2026-01-01 至 2026-01-31</div>
            </div>

            <!-- 大盘 -->
            <div v-show="tab === 'overview'" class="space-y-6">
                <div class="grid grid-cols-4 gap-6">
                    <div class="card" v-for="t in stats.tiles"><div class="text-gray-400 text-xs">{{t.l}}</div><div class="stat-value">{{t.v}}</div></div>
                </div>
                <div class="card"><div id="map" style="height:500px"></div></div>
            </div>

            <!-- 趋势 -->
            <div v-show="tab === 'trend'" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="card" v-for="id in ['t1','t2','t3','t4']"><div :id="id" style="height:300px"></div></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 兜底数据
        if (typeof DB === 'undefined') window.DB = { all_records: [], provinces: [] };

        const { createApp, ref, computed, onMounted, watch } = Vue;
        createApp({
            setup() {
                const tab = ref('overview');
                const menu = [{n:'大盘概览',k:'overview'},{n:'趋势分析',k:'trend'},{n:'门店排行',k:'store'}];
                const stats = computed(() => {
                    const r = DB.all_records.reduce((a,b)=>a+b.revenue, 0);
                    const o = DB.all_records.reduce((a,b)=>a+b.orders, 0);
                    return { tiles: [{l:'总营收', v:'¥'+r.toFixed(0)}, {l:'总订单',v:o}, {l:'覆盖省份',v:DB.provinces.length}, {l:'数据更新',v:'1月'}] };
                });

                const draw = () => {
                    if(tab.value === 'overview') {
                        const m = echarts.init(document.getElementById('map'));
                        m.setOption({ series:[{type:'map', mapType:'china', data:[]}] });
                    }
                    if(tab.value === 'trend') {
                        const dates = [...new Set(DB.all_records.map(d=>d.date_fmt))].sort();
                        ['t1','t2','t3','t4'].forEach(id => {
                            const c = echarts.init(document.getElementById(id));
                            c.setOption({ xAxis:{data:dates}, series:[{type:'line', data:dates.map(d=>DB.all_records.filter(x=>x.date_fmt===d).reduce((a,b)=>a+b.revenue,0))}] });
                        });
                    }
                };

                watch(tab, () => setTimeout(draw, 50));
                onMounted(() => setTimeout(draw, 500));

                return { tab, menu, stats, currentName: computed(()=>menu.find(m=>m.k===tab.value).n) };
            }
        }).mount('#app');
    </script>
</body>
</html>
